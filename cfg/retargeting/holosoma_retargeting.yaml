# holosoma_retargeting — Willow WBT module config
# Repo: amazon-far/holosoma (src/holosoma_retargeting/)
# Install: follow modules/third_party/holosoma/scripts/source_retargeting_setup.sh

env: hsretargeting

# Wrapper scripts (willow code, runs in hsretargeting env)
wrappers:
  convert: scripts/wrappers/holosoma_convert.py   # qpos .npz → form B .npz via MuJoCo bridge


# Entry points (run from repo root)
entry_points:
  single:
    cmd: python examples/robot_retarget.py
    cwd: modules/01_retargeting/holosoma_retargeting
    args:
      input_dir:   --data_path
      output_dir:  --save_dir
      task_type:   --task-type       # robot_only | object_interaction | climbing
      task_name:   --task-name
      data_format: --data_format     # smplh | smplx | lafan | mocap
      robot_urdf:  --robot-config.robot-urdf-file
      visualize:   --retargeter.visualize
      debug:       --retargeter.debug
  batch:
    cmd: python examples/parallel_robot_retarget.py
    cwd: modules/01_retargeting/holosoma_retargeting
    args:
      input_dir:   --data-dir
      output_dir:  --save_dir
      task_type:   --task-type
      data_format: --data_format
      robot_urdf:  --robot-config.robot-urdf-file
      object_name: --task-config.object-name
